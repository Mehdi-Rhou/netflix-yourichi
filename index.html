<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEHDI-FLIX - Unlimited Movies & TV Shows</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css?v=50">

  <!-- HLS Player -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-brand" onclick="app.showHome()">MEHDI-FLIX</div>
    <div class="nav-links" id="navLinks">
      <a href="#" class="active" onclick="app.showHome(event)">Home</a>
      <a href="#" onclick="app.filterType('tv', event)">Series</a>
      <a href="#" onclick="app.filterType('movie', event)">Movies</a>
      <a href="#" onclick="app.filterType('anime', event)">Anime</a>
    </div>
    <div class="nav-right">
      <div class="search-wrapper" id="searchWrap">
        <button class="search-toggle" id="searchBtn">
          <svg viewBox="0 0 24 24">
            <path
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
          </svg>
        </button>
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24">
            <path
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
          </svg>
          <input type="text" id="searchInput" placeholder="Titles, people, genres...">
        </div>
      </div>
    </div>
  </nav>

  <!-- SEARCH RESULTS -->
  <div class="search-page" id="searchPage">
    <h2>Search Results</h2>
    <div class="results-grid" id="searchGrid"></div>
  </div>

  <!-- MAIN APP CONTENT -->
  <main id="mainContent">

    <!-- HERO SECTION -->
    <div class="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-content">
        <div class="hero-badge">⭐ Featured Content</div>
        <h1 class="hero-title" id="heroTitle">...</h1>
        <div class="hero-meta" id="heroMeta"></div>
        <p class="hero-overview" id="heroOverview">...</p>
        <div class="hero-actions">
          <button class="btn btn-primary" id="heroWatchBtn">
            <svg viewBox="0 0 24 24" style="fill:currentColor">
              <path d="M8 5v14l11-7z" />
            </svg> Play
          </button>
          <button class="btn btn-secondary">
            <svg viewBox="0 0 24 24" style="fill:currentColor">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
            </svg> More Info
          </button>
        </div>
      </div>
    </div>

    <!-- GENRE TABS -->
    <div class="genre-bar" id="genreBar"></div>

    <!-- DYNAMIC CONTENT ROWS -->
    <div id="rowsContainer">
      <!-- Loading Skeleton for Rows -->
      <div class="content-section" style="padding-left:48px; padding-right:48px;">
        <div class="skeleton" style="width:200px; height:24px; margin-bottom:12px;"></div>
        <div style="display:flex; gap:12px;">
          <div class="card" style="pointer-events:none;"><div class="card-inner"><div class="skeleton" style="width:100%;height:100%;"></div></div></div>
          <div class="card" style="pointer-events:none;"><div class="card-inner"><div class="skeleton" style="width:100%;height:100%;"></div></div></div>
          <div class="card" style="pointer-events:none;"><div class="card-inner"><div class="skeleton" style="width:100%;height:100%;"></div></div></div>
          <div class="card" style="pointer-events:none;"><div class="card-inner"><div class="skeleton" style="width:100%;height:100%;"></div></div></div>
          <div class="card" style="pointer-events:none;"><div class="card-inner"><div class="skeleton" style="width:100%;height:100%;"></div></div></div>
        </div>
      </div>
    </div>

  </main>

  <!-- MOVIE / SHOW MODAL -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modalBox">
      <button class="modal-close" id="modalClose">✕</button>

      <div class="modal-banner">
        <img id="modalBannerImg" src="" alt="Banner">
      </div>

      <div class="modal-header">
        <h2 class="modal-movie-title" id="modalTitle">...</h2>
      </div>

      <div class="modal-body">
        <div class="modal-actions">
          <button class="btn btn-primary" id="modalWatchBtn">
            <svg viewBox="0 0 24 24" style="fill:currentColor">
              <path d="M8 5v14l11-7z" />
            </svg> Watch
          </button>
          <button class="btn btn-secondary btn-sm"
            style="border-radius:50%;width:42px;height:42px;padding:0;justify-content:center;">+</button>
        </div>

        <div class="modal-grid">
          <div class="modal-left">
            <div class="hero-meta" id="modalMeta" style="margin-bottom:16px;"></div>
            <p class="modal-overview" id="modalOverview">...</p>

            <!-- TV SHOW SEASONS -->
            <div class="season-picker" id="episodesSection" style="display:none;">
              <h3>Episodes</h3>
              <div class="season-tabs" id="seasonTabs"></div>
              <div class="episodes-list" id="episodesList"></div>
            </div>

            <!-- STREAMING LINKS -->
            <div class="streams-section" id="streamsSection">
              <h3>Available Streams <span style="font-size:0.75rem;font-weight:400;color:#777;margin-left:auto">(Powered
                  by Torrentio)</span></h3>
              <div class="streams-list" id="streamsList"></div>
            </div>


          </div>

          <div class="modal-right">
            <div class="modal-details" id="modalDetails"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FULLSCREEN VIDEO PLAYER -->
  <div class="video-player-overlay" id="videoPlayerOverlay">
    <div class="player-topbar">
      <button class="player-back-btn" id="playerBackBtn">
        <svg viewBox="0 0 24 24">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
        </svg>
      </button>
      <div class="player-now-playing">
        <span class="player-label">Now Playing</span>
        <span class="player-title-text" id="playerTitleText">...</span>
      </div>
      <div class="player-topbar-right">
        <button class="player-fullscreen-btn" id="playerFullscreenBtn" title="Toggle Fullscreen">
          <svg viewBox="0 0 24 24">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
          </svg>
        </button>
      </div>
    </div>

    <div class="player-iframe-container" id="playerIframeContainer">
      <div class="player-loading" id="playerLoading">
        <div class="player-loading-spinner"></div>
        <p>Loading player...</p>
      </div>
      <iframe id="playerIframe" allowfullscreen
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>
      <video id="customVideoPlayer" class="hidden" controls playsinline></video>
    </div>

    <div class="player-source-bar" id="playerSourceBar">
      <span class="source-bar-label">Source:</span>
      <div class="source-tabs" id="sourceTabs"></div>
    </div>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div class="toast" id="toast"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-dev">
      <span class="footer-dev-name">Developed by <strong>Rhouarhi Mehdi</strong></span>
      <a href="https://www.instagram.com/rhou-mehdi" target="_blank" rel="noopener noreferrer" class="footer-insta">
        <svg class="insta-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.17.054 1.97.24 2.43.403a4.088 4.088 0 0 1 1.47.957c.453.453.793.898.957 1.47.163.46.349 1.26.404 2.43.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.055 1.17-.241 1.97-.404 2.43a4.088 4.088 0 0 1-.957 1.47 4.088 4.088 0 0 1-1.47.957c-.46.163-1.26.349-2.43.404-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.17-.055-1.97-.241-2.43-.404a4.088 4.088 0 0 1-1.47-.957 4.088 4.088 0 0 1-.957-1.47c-.163-.46-.349-1.26-.404-2.43C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.055-1.17.241-1.97.404-2.43a4.088 4.088 0 0 1 .957-1.47A4.088 4.088 0 0 1 5.064 2.293c.46-.163 1.26-.349 2.43-.404C8.416 2.175 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.333.014 7.053.072 5.775.13 4.902.333 4.14.63a6.21 6.21 0 0 0-2.245 1.462A6.21 6.21 0 0 0 .433 4.337C.136 5.1-.067 5.973.009 7.251.067 8.53.053 8.939.053 12.198s.014 3.668.072 4.948c.058 1.278.261 2.15.558 2.913a6.21 6.21 0 0 0 1.462 2.245 6.21 6.21 0 0 0 2.245 1.462c.763.297 1.636.5 2.914.558C8.333 23.986 8.741 24 12 24s3.668-.014 4.948-.072c1.278-.058 2.15-.261 2.913-.558a6.21 6.21 0 0 0 2.245-1.462 6.21 6.21 0 0 0 1.462-2.245c.297-.763.5-1.636.558-2.914.058-1.28.072-1.688.072-4.948s-.014-3.668-.072-4.948c-.058-1.278-.261-2.15-.558-2.913a6.21 6.21 0 0 0-1.462-2.245A6.21 6.21 0 0 0 19.861.433C19.1.136 18.226-.067 16.948.009 15.669.067 15.26.053 12.001.053zM12 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
        @rhou-mehdi
      </a>
    </div>
    <p class="footer-copy">© 2026 MEHDI-FLIX. All rights reserved.</p>
  </footer>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
  <script src="js/api.js?v=42"></script>
  <script src="js/app.js?v=42"></script>
</body>

</html>
